name: Import gpui-component

"on":
  workflow_dispatch:
    inputs:
      zed_ref:
        description: "Branch, tag, or SHA of this zed fork to use as the base"
        required: true
        default: "main"

      source_repo:
        description: "Repository to import from"
        required: true
        default: "cyfung1031/gpui-component"

      source_ref:
        description: "Branch, tag, or SHA from source repo to import"
        required: true
        default: "main"

      target_branch:
        description: "Branch to create/update with the plain import"
        required: true
        default: "generated"

      modified_suffix:
        description: "Suffix for the modified branch"
        required: true
        default: "-modified"

permissions:
  contents: write

jobs:
  import:
    name: Import gpui-component into Zed workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout zed fork
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.zed_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create target branch from selected zed ref
        shell: bash
        run: |
          set -euo pipefail

          TARGET_BRANCH="${{ inputs.target_branch }}"
          git checkout -B "$TARGET_BRANCH"

      - name: Checkout gpui-component source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: _gpui_component_source
          fetch-depth: 1

      - name: Detect source crates
        id: detect
        shell: python
        run: |
          from pathlib import Path
          import tomllib
          import json
          import os

          src = Path("_gpui_component_source")

          package_to_target = {
              "gpui-component": "crates/gpui_component",
              "gpui-component-assets": "crates/gpui_component_assets",
              "gpui-component-macros": "crates/gpui_component_macros",
              "gpui-component-story": "crates/gpui_component_story",
              "gpui-component-story-web": "crates/gpui_component_story_web",
          }

          found = {}

          for cargo_toml in src.rglob("Cargo.toml"):
              if "target" in cargo_toml.parts:
                  continue

              try:
                  data = tomllib.loads(cargo_toml.read_text())
              except Exception:
                  continue

              package = data.get("package", {})
              name = package.get("name")

              if name in package_to_target:
                  found[name] = {
                      "source": str(cargo_toml.parent),
                      "target": package_to_target[name],
                  }

          if "gpui-component" not in found:
              print("Could not find package name gpui-component")
              print("Cargo.toml files found:")
              for cargo_toml in src.rglob("Cargo.toml"):
                  print(f"  {cargo_toml}")
              raise SystemExit(1)

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a") as f:
              f.write(f"crates_json={json.dumps(found)}\n")

          print(json.dumps(found, indent=2))

      - name: Import crates into zed/crates
        shell: python
        run: |
          from pathlib import Path
          import json
          import shutil

          crates = json.loads(r'''${{ steps.detect.outputs.crates_json }}''')

          Path("crates").mkdir(exist_ok=True)

          for package, item in crates.items():
              source = Path(item["source"])
              target = Path(item["target"])

              if target.exists():
                  shutil.rmtree(target)

              shutil.copytree(
                  source,
                  target,
                  ignore=shutil.ignore_patterns(
                      ".git",
                      "target",
                      ".DS_Store",
                  ),
              )

              print(f"Imported {package}: {source} -> {target}")

      - name: Patch root workspace Cargo.toml
        shell: python
        run: |
          from pathlib import Path
          import json
          import re

          crates = json.loads(r'''${{ steps.detect.outputs.crates_json }}''')

          root = Path("Cargo.toml")
          text = root.read_text()

          members_to_add = [
              item["target"]
              for item in crates.values()
              if Path(item["target"]).exists()
          ]

          if not re.search(r'(?m)^\[workspace\]\s*$', text):
              text += "\n[workspace]\n"

          members_match = re.search(r'(?ms)^members\s*=\s*\[(.*?)\]', text)

          if members_match:
              block = members_match.group(0)
              inner = members_match.group(1)
              existing_members = set(re.findall(r'"([^"]+)"', inner))

              additions = []
              for member in members_to_add:
                  if member not in existing_members:
                      additions.append(f'    "{member}",')

              if additions:
                  new_block = block[:-1].rstrip() + "\n" + "\n".join(additions) + "\n]"
                  text = text[:members_match.start()] + new_block + text[members_match.end():]
          else:
              workspace_match = re.search(r'(?m)^\[workspace\]\s*$', text)
              insert_at = workspace_match.end()

              member_lines = "\n\nmembers = [\n"
              for member in members_to_add:
                  member_lines += f'    "{member}",\n'
              member_lines += "]\n"

              text = text[:insert_at] + member_lines + text[insert_at:]

          if "[workspace.dependencies]" not in text:
              text += "\n[workspace.dependencies]\n"

          dep_section = re.search(
              r'(?ms)^\[workspace\.dependencies\]\s*(.*?)(?=^\[|\Z)',
              text,
          )

          deps_to_add = {
              package: f'{{ path = "{item["target"]}" }}'
              for package, item in crates.items()
              if Path(item["target"]).exists()
          }

          if dep_section:
              section = dep_section.group(0)
              additions = []

              for name, value in deps_to_add.items():
                  if not re.search(rf'(?m)^\s*{re.escape(name)}\s*=', section):
                      additions.append(f'{name} = {value}')

              if additions:
                  new_section = section.rstrip() + "\n" + "\n".join(additions) + "\n"
                  text = text[:dep_section.start()] + new_section + text[dep_section.end():]

          root.write_text(text)

      - name: Copy and merge gpui-component root workspace dependencies into zed root
        shell: python
        run: |
          from pathlib import Path
          import re

          source_root = Path("_gpui_component_source/Cargo.toml")
          target_root = Path("Cargo.toml")

          if not source_root.exists():
              raise SystemExit("Missing _gpui_component_source/Cargo.toml")

          source_text = source_root.read_text()
          target_text = target_root.read_text()

          def extract_section_bounds(text: str, section_name: str):
              match = re.search(
                  rf'(?ms)^\[{re.escape(section_name)}\]\s*(.*?)(?=^\[|\Z)',
                  text,
              )
              if not match:
                  return None
              return match.start(), match.end(), match.group(0), match.group(1)

          def ensure_section(text: str, section_name: str) -> str:
              if not re.search(rf'(?m)^\[{re.escape(section_name)}\]\s*$', text):
                  text = text.rstrip() + f"\n\n[{section_name}]\n"
              return text

          def parse_dependency_entries(section_full: str):
              lines = section_full.splitlines()
              entries = {}
              order = []

              current = []
              depth_curly = 0
              depth_square = 0

              for raw_line in lines:
                  line = raw_line.rstrip()

                  if line.strip().startswith("["):
                      continue

                  if not current:
                      stripped = line.strip()

                      if not stripped or stripped.startswith("#"):
                          continue

                      if not re.match(r'^[A-Za-z0-9_\-]+\s*=', stripped):
                          continue

                  current.append(line)

                  code = line.split("#", 1)[0]
                  depth_curly += code.count("{") - code.count("}")
                  depth_square += code.count("[") - code.count("]")

                  if depth_curly <= 0 and depth_square <= 0:
                      entry = "\n".join(current)
                      current = []
                      depth_curly = 0
                      depth_square = 0

                      match = re.match(r'^\s*([A-Za-z0-9_\-]+)\s*=', entry)
                      if match:
                          name = match.group(1)
                          entries[name] = entry
                          order.append(name)

              return entries, order

          def extract_features(entry: str):
              match = re.search(r'features\s*=\s*\[([^\]]*)\]', entry, re.S)
              if not match:
                  return []

              body = match.group(1)
              return re.findall(r'"([^"]+)"', body)

          def has_default_features_false(entry: str) -> bool:
              return bool(re.search(r'default-features\s*=\s*false', entry))

          def is_table_dependency(entry: str) -> bool:
              return bool(re.match(r'^\s*[A-Za-z0-9_\-]+\s*=\s*\{', entry, re.S))

          def simple_to_table(entry: str) -> str:
              match = re.match(r'^\s*([A-Za-z0-9_\-]+)\s*=\s*"([^"]+)"\s*$', entry)
              if not match:
                  return entry

              name, version = match.group(1), match.group(2)
              return f'{name} = {{ version = "{version}" }}'

          def merge_features_into_entry(target_entry: str, source_features):
              if not source_features:
                  return target_entry

              target_entry = simple_to_table(target_entry)
              existing_features = extract_features(target_entry)

              merged = []
              for feature in existing_features + source_features:
                  if feature not in merged:
                      merged.append(feature)

              features_text = "features = [" + ", ".join(f'"{feature}"' for feature in merged) + "]"

              if re.search(r'features\s*=\s*\[[^\]]*\]', target_entry, re.S):
                  return re.sub(
                      r'features\s*=\s*\[[^\]]*\]',
                      features_text,
                      target_entry,
                      flags=re.S,
                  )

              if is_table_dependency(target_entry):
                  return re.sub(
                      r'\}\s*$',
                      f', {features_text} }}',
                      target_entry,
                      flags=re.S,
                  )

              return target_entry

          def merge_default_features_false(target_entry: str, source_entry: str):
              if not has_default_features_false(source_entry):
                  return target_entry

              target_entry = simple_to_table(target_entry)

              if re.search(r'default-features\s*=', target_entry):
                  return re.sub(
                      r'default-features\s*=\s*(true|false)',
                      'default-features = false',
                      target_entry,
                  )

              if is_table_dependency(target_entry):
                  return re.sub(
                      r'\}\s*$',
                      ', default-features = false }',
                      target_entry,
                      flags=re.S,
                  )

              return target_entry

          def merge_entry(target_entry: str, source_entry: str):
              merged = target_entry
              merged = merge_features_into_entry(merged, extract_features(source_entry))
              merged = merge_default_features_false(merged, source_entry)
              return merged

          source_bounds = extract_section_bounds(source_text, "workspace.dependencies")
          if not source_bounds:
              raise SystemExit("Source repo has no [workspace.dependencies]")

          _, _, source_section_full, _ = source_bounds
          source_entries, source_order = parse_dependency_entries(source_section_full)

          target_text = ensure_section(target_text, "workspace.dependencies")

          target_bounds = extract_section_bounds(target_text, "workspace.dependencies")
          if not target_bounds:
              raise SystemExit("Could not locate target [workspace.dependencies]")

          target_start, target_end, target_section_full, _ = target_bounds
          target_entries, target_order = parse_dependency_entries(target_section_full)

          # Do not copy/merge these from the source repo.
          # gpui is handled separately as a local gpui_facade dependency in gpui-component.
          skip = {
              "gpui",
              "gpui-component",
              "gpui-component-assets",
              "gpui-component-macros",
              "gpui-component-story",
              "gpui-component-story-web",
              "story",
          }

          changed = False
          additions = []
          replacements = {}

          for name in source_order:
              if name in skip:
                  continue

              source_entry = source_entries[name]

              if name not in target_entries:
                  additions.append(source_entry)
                  changed = True
                  continue

              target_entry = target_entries[name]
              merged_entry = merge_entry(target_entry, source_entry)

              if merged_entry != target_entry:
                  replacements[name] = merged_entry
                  changed = True

          new_target_section = target_section_full

          for name, merged_entry in replacements.items():
              old_entry = target_entries[name]
              new_target_section = new_target_section.replace(old_entry, merged_entry)

          if additions:
              new_target_section = new_target_section.rstrip() + "\n" + "\n".join(additions) + "\n"

          if changed:
              target_text = target_text[:target_start] + new_target_section + target_text[target_end:]
              target_root.write_text(target_text)

              if additions:
                  print("Copied missing workspace dependencies:")
                  for entry in additions:
                      print("  " + entry.splitlines()[0])

              if replacements:
                  print("Merged source workspace dependency options into existing zed dependencies:")
                  for name in replacements:
                      print(f"  {name}")
          else:
              print("No workspace dependency additions or merges needed.")

      - name: Rewrite zed-industries git workspace dependencies to local sibling paths
        shell: python
        run: |
          from pathlib import Path
          import re
          import tomllib

          root = Path("Cargo.toml")
          text = root.read_text()

          crates_dir = Path("crates")

          local_packages = {}

          for cargo_toml in crates_dir.glob("*/Cargo.toml"):
              try:
                  data = tomllib.loads(cargo_toml.read_text())
              except Exception:
                  continue

              package = data.get("package", {})
              name = package.get("name")

              if name:
                  local_packages[name] = cargo_toml.parent.as_posix()

          def rewrite_entry(match):
              dep_name = match.group("name")
              body = match.group("body")

              if "github.com/zed-industries/" not in body:
                  return match.group(0)

              package_match = re.search(r'package\s*=\s*"([^"]+)"', body)
              package_name = package_match.group(1) if package_match else dep_name

              local_path = local_packages.get(package_name)

              if not local_path:
                  print(f"No local sibling crate found for {dep_name} / package {package_name}; keeping git dependency.")
                  return match.group(0)

              preserved = []

              if package_name != dep_name:
                  preserved.append(f'package = "{package_name}"')

              features_match = re.search(r'features\s*=\s*\[([^\]]*)\]', body, re.S)
              if features_match:
                  preserved.append("features = [" + features_match.group(1).strip() + "]")

              default_features_match = re.search(r'default-features\s*=\s*(true|false)', body)
              if default_features_match:
                  preserved.append(f"default-features = {default_features_match.group(1)}")

              optional_match = re.search(r'optional\s*=\s*(true|false)', body)
              if optional_match:
                  preserved.append(f"optional = {optional_match.group(1)}")

              parts = [f'path = "{local_path}"'] + preserved
              rewritten = f'{dep_name} = {{ ' + ", ".join(parts) + " }"

              print(f"Rewrote {dep_name}: zed-industries git dependency -> {local_path}")
              return rewritten

          text = re.sub(
              r'(?m)^(?P<name>[A-Za-z0-9_\-]+)\s*=\s*\{(?P<body>[^\n]*github\.com/zed-industries/[^\n]*)\}\s*$',
              rewrite_entry,
              text,
          )

          root.write_text(text)

      - name: Remove nested workspace metadata from imported crates
        shell: python
        run: |
          from pathlib import Path
          import json
          import re

          crates = json.loads(r'''${{ steps.detect.outputs.crates_json }}''')

          for item in crates.values():
              toml = Path(item["target"]) / "Cargo.toml"

              if not toml.exists():
                  continue

              text = toml.read_text()

              text = re.sub(
                  r'(?ms)^\[workspace\]\s*.*?(?=^\[|\Z)',
                  '',
                  text,
              )

              text = re.sub(
                  r'(?ms)^\[workspace\.dependencies\]\s*.*?(?=^\[|\Z)',
                  '',
                  text,
              )

              toml.write_text(text)

      - name: Patch imported dependencies to workspace dependencies
        shell: python
        run: |
          from pathlib import Path
          import json
          import re

          crates = json.loads(r'''${{ steps.detect.outputs.crates_json }}''')

          imported_packages = set(crates.keys())

          zed_workspace_packages = {
              "gpui",
              "gpui_platform",
              "gpui_macros",
              "gpui_web",
          }

          packages_to_patch = imported_packages | zed_workspace_packages

          def patch_dependency_to_workspace(cargo_toml: Path, crate_name: str):
              text = cargo_toml.read_text()

              text = re.sub(
                  rf'(?m)^\s*{re.escape(crate_name)}\s*=\s*\{{[^\n]*\}}\s*$',
                  f'{crate_name}.workspace = true',
                  text,
              )

              text = re.sub(
                  rf'(?m)^\s*{re.escape(crate_name)}\s*=\s*"[^"]+"\s*$',
                  f'{crate_name}.workspace = true',
                  text,
              )

              cargo_toml.write_text(text)

          for item in crates.values():
              target = Path(item["target"])

              for cargo_toml in target.rglob("Cargo.toml"):
                  for package in packages_to_patch:
                      patch_dependency_to_workspace(cargo_toml, package)

      - name: Force gpui-component to use local gpui_facade package
        shell: python
        run: |
          from pathlib import Path
          import re

          cargo_toml = Path("crates/gpui_component/Cargo.toml")

          if not cargo_toml.exists():
              raise SystemExit("crates/gpui_component/Cargo.toml not found")

          text = cargo_toml.read_text()

          replacement = 'gpui = { package = "gpui_facade", path = "../gpui_facade", features = ["gpui_macos", "gpui_web", "gpui_macros", "font-kit", "x11", "wayland", "runtime_shaders"] }'

          text = re.sub(
              r'(?m)^\s*gpui\.workspace\s*=\s*true\s*$\n?',
              '',
              text,
          )

          text = re.sub(
              r'(?m)^\s*gpui\s*=\s*"[^"]+"\s*$\n?',
              '',
              text,
          )

          text = re.sub(
              r'(?m)^\s*gpui\s*=\s*\{[^\n]*\}\s*$\n?',
              '',
              text,
          )

          dependencies_match = re.search(r'(?m)^\[dependencies\]\s*$', text)

          if not dependencies_match:
              text += "\n[dependencies]\n" + replacement + "\n"
          else:
              insert_at = dependencies_match.end()
              text = text[:insert_at] + "\n" + replacement + text[insert_at:]

          cargo_toml.write_text(text)

      - name: Validate plain import
        shell: bash
        run: |
          set -euo pipefail

          cargo metadata --no-deps

      - name: Commit plain import
        id: import_commit
        shell: bash
        run: |
          set -euo pipefail

          git add Cargo.toml crates/gpui_component*

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No plain import changes to commit."
            exit 0
          fi

          git commit -m "Import gpui-component into workspace"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push plain import branch
        shell: bash
        run: |
          set -euo pipefail

          git push --force-with-lease origin "${{ inputs.target_branch }}"

      - name: Create modified branch
        shell: bash
        run: |
          set -euo pipefail

          MODIFIED_BRANCH="${{ inputs.target_branch }}${{ inputs.modified_suffix }}"
          git checkout -B "$MODIFIED_BRANCH"

      - name: Apply gpui-unofficial-style modifications
        shell: python
        run: |
          from pathlib import Path
          import json
          import re

          crates = json.loads(r'''${{ steps.detect.outputs.crates_json }}''')

          imported_roots = [
              Path(item["target"])
              for item in crates.values()
              if Path(item["target"]).exists()
          ]

          text_extensions = {
              ".rs",
              ".toml",
              ".md",
              ".mdx",
              ".txt",
              ".ron",
              ".json",
              ".yml",
              ".yaml",
          }

          def is_text_file(path: Path) -> bool:
              return path.suffix in text_extensions

          for root in imported_roots:
              for path in root.rglob("*"):
                  if not path.is_file():
                      continue

                  if not is_text_file(path):
                      continue

                  try:
                      text = path.read_text()
                  except UnicodeDecodeError:
                      continue

                  original = text

                  text = text.replace("gpui_platform::", "gpui::gpui_platform::")
                  text = text.replace("gpui_web::", "gpui::gpui_web::")
                  text = text.replace("gpui_macros::", "gpui::gpui_macros::")

                  if text != original:
                      path.write_text(text)

          def remove_direct_split_crate_deps(cargo_toml: Path):
              text = cargo_toml.read_text()
              original = text

              for dep in ["gpui_platform", "gpui_web", "gpui_macros"]:
                  text = re.sub(
                      rf'(?m)^\s*{re.escape(dep)}\.workspace\s*=\s*true\s*\n',
                      '',
                      text,
                  )

                  text = re.sub(
                      rf'(?m)^\s*{re.escape(dep)}\s*=\s*\{{[^\n]*\}}\s*\n',
                      '',
                      text,
                  )

                  text = re.sub(
                      rf'(?m)^\s*{re.escape(dep)}\s*=\s*"[^"]+"\s*\n',
                      '',
                      text,
                  )

              text = text.replace(
                  'inspector = ["gpui_macros/inspector", "gpui/inspector"]',
                  'inspector = ["gpui/inspector"]',
              )

              text = text.replace(
                  'inspector = ["gpui/inspector", "gpui_macros/inspector"]',
                  'inspector = ["gpui/inspector"]',
              )

              text = re.sub(
                  r"(?ms)^\[target\.'cfg\(target_family = \"wasm\"\)'\.dependencies\]\s*(?=^\[|\Z)",
                  "",
                  text,
              )

              if text != original:
                  cargo_toml.write_text(text)

          for root in imported_roots:
              for cargo_toml in root.rglob("Cargo.toml"):
                  remove_direct_split_crate_deps(cargo_toml)

      - name: Validate modified branch
        shell: bash
        run: |
          set -euo pipefail

          cargo metadata --no-deps

      - name: Commit modified branch
        id: modified_commit
        shell: bash
        run: |
          set -euo pipefail

          git add Cargo.toml crates/gpui_component*

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No modified changes to commit."
            exit 0
          fi

          git commit -m "Apply gpui-component workspace modifications"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push modified branch
        shell: bash
        run: |
          set -euo pipefail

          MODIFIED_BRANCH="${{ inputs.target_branch }}${{ inputs.modified_suffix }}"
          git push --force-with-lease origin "$MODIFIED_BRANCH"
